      - generic [ref=e98]:
        - generic [ref=e99]:
          - paragraph [ref=e100]: I'm an industrial engineer from Chile who transitioned into software development through a Python developer bootcamp in Berlin. Since then I've built three production-deployed full-stack applications covering REST APIs, relational databases, and React frontends — and I design AI-assisted automation workflows using Make.com and AI coding agents as part of my daily engineering practice.
          - paragraph [ref=e101]: Across my projects I've shipped JWT refresh token rotation, a genre-weighted recommendation engine, multi-level drag-and-drop with a 15-route REST API, and a Web Audio API look-ahead scheduler — backed by 106 automated tests in ShowFreak. My engineering background gives me a structured approach to problem decomposition before I write a line of code.
          - paragraph [ref=e102]: I work in TypeScript across the full stack (React · Node.js · Express · PostgreSQL) and also in Python with Django REST Framework. I speak English (C1), Spanish (native), Italian, and conversational Danish. Open to full-stack and frontend roles — remote or on-site in Copenhagen.
