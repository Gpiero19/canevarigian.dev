      - generic [ref=e182]:
        - generic [ref=e183]:
          - paragraph [ref=e184]: Full-stack developer based in Copenhagen. I transitioned into software engineering through a Python bootcamp in Berlin after a degree in industrial engineering, and have since built four production-deployed applications across the full stack — REST APIs, relational databases, React frontends, and this portfolio itself. Currently doing freelance web development and recently completed an AI automation internship working with Make.com and Claude Code.
          - paragraph [ref=e185]: Across those projects I've shipped JWT refresh token rotation, a genre-weighted recommendation engine, multi-level drag-and-drop with a 15-route REST API, and a Web Audio API look-ahead scheduler — backed by 106 automated tests. My engineering background means I think in systems before I write code.
          - paragraph [ref=e186]: Available now for full-stack and frontend roles, remote or on-site in Copenhagen. TypeScript across the full stack, Python with Django when the work calls for it. I speak English (C1), Spanish (native), Italian, and conversational Danish.
